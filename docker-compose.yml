version: "3.9"

services:
  # --- GATEWAY PRINCIPALE ---
  healthai-api:
    build: ./healthai-api
    ports:
      - "${HEALTHAI_API_PORT}:8000"
    env_file:
      - ./healthai-api/.env
    # Montage du dossier src local vers le dossier app dans le conteneur
    volumes:
      - ./healthai-api/src:/app/src
    # Force le rechargement automatique du serveur au changement de code
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    depends_on:
      - healthai-vision
      - healthai-workout
      #- postgres
    networks:
      - healthai-net

  # --- SERVICE VISION ---
  healthai-vision:
    build: ./healthai-vision
    ports:
      - "${HEALTHAI_VISION_PORT}:8001"
    env_file:
      - ./healthai-vision/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URL=${MONGODB_URL}
    volumes:
      - ./healthai-vision/src:/app/src
      - hf_cache:/app/.hf_cache
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload",
      ]
    #depends_on:
    #  - postgres
    networks:
      - healthai-net

  # --- SERVICE WORKOUT ---
  healthai-workout:
    build: ./healthai-workout
    ports:
      - "${HEALTHAI_WORKOUT_PORT}:8002"
    env_file:
      - ./healthai-workout/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URL=${MONGODB_URL}
    volumes:
      - ./healthai-workout/src:/app/src
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8002",
        "--reload",
      ]
    depends_on:
      #- postgres
      - mongo
    networks:
      - healthai-net

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - healthai-net

  #postgres:
  #  image: postgres:16
  #  environment:
  #    POSTGRES_USER: healthai
  #    POSTGRES_PASSWORD: healthai
  #    POSTGRES_DB: healthai_db
  #  ports:
  #    - "5433:5432"
  #  volumes:
  #    - pg-data:/var/lib/postgresql/data
  #  networks:
  #    - healthai-net

volumes:
  mongo-data:
  #pg-data:
  hf_cache:

networks:
  healthai-net:
    driver: bridge

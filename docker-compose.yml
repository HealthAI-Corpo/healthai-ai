services:
  healthai-vision:
    build: ./healthai-vision
    ports:
      - "8001:8001"
    env_file:
      - ./healthai-vision/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://healthai:healthai@postgres:5432/healthai_db
    depends_on:
      - postgres
    networks:
      - healthai-net
    volumes:
      - .:/app
      - hf_cache:/app/.hf_cache

  healthai-workout:
    build: ./healthai-workout
    ports:
      - "8002:8002"
    env_file:
      - ./healthai-workout/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://healthai:healthai@postgres:5432/healthai_db
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - postgres
      - mongo
    networks:
      - healthai-net

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - healthai-net

  # postgres est fourni par healthai-infra en prod
  # Ce service est uniquement pour le développement local isolé
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: healthai
      POSTGRES_PASSWORD: healthai
      POSTGRES_DB: healthai_db
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - healthai-net

volumes:
  mongo-data:
  pg-data:

networks:
  healthai-net:
    driver: bridge

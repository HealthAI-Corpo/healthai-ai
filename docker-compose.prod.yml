services:

  # --- GATEWAY ---
  healthai-api:
    image: ghcr.io/healthai-corpo/healthai-ai-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VISION_SERVICE_URL=http://healthai-vision:8001
      - WORKOUT_SERVICE_URL=http://healthai-workout:8002
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      healthai-vision:
        condition: service_healthy
      healthai-workout:
        condition: service_healthy
    networks:
      - internal

  # --- VISION ---
  healthai-vision:
    image: ghcr.io/healthai-corpo/healthai-vision:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URL=${MONGODB_URL}
      - HF_MODEL_NAME=${HF_MODEL_NAME:-yolov8n.pt}
      - HF_CACHE_DIR=/app/.hf_cache
    volumes:
      - hf_cache:/app/.hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # --- WORKOUT ---
  healthai-workout:
    image: ghcr.io/healthai-corpo/healthai-workout:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_URL=${MONGODB_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

volumes:
  hf_cache:

networks:
  internal:
    driver: bridge

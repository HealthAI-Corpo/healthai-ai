name: CI

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Ruff (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [healthai-vision, healthai-workout, healthai-api]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
        working-directory: ${{ matrix.service }}
      - run: uv run ruff check .
        working-directory: ${{ matrix.service }}
      - run: uv run ruff format --check .
        working-directory: ${{ matrix.service }}

  test:
    name: pytest (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [healthai-vision, healthai-workout]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
        working-directory: ${{ matrix.service }}
      - run: uv run pytest tests/ -v --tb=short
        working-directory: ${{ matrix.service }}

  ci-ok:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi

  # Build & push des 3 images IA sur ghcr.io.
  # Déclenché sur :
  #   - push main          -> tags ":latest" + ":main-<sha7>"
  #   - tag git v*         -> tags ":1.2.3" + ":1.2" + ":1" + ":latest"
  # Le contexte de build est la RACINE du repo (et non le sous-dossier), car le
  # Dockerfile de chaque service copie aussi healthai-common (path dependency).
  build-push:
    name: Build & Push → ghcr.io (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: healthai-vision
            dockerfile: healthai-vision/Dockerfile
            image: ghcr.io/healthai-corpo/healthai-vision
          - name: healthai-workout
            dockerfile: healthai-workout/Dockerfile
            image: ghcr.io/healthai-corpo/healthai-workout
          - name: healthai-ai-gateway
            dockerfile: healthai-api/Dockerfile
            image: ghcr.io/healthai-corpo/healthai-ai-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.service.image }}
          # Sur main : :latest + :main-sha7 (immuable)
          # Sur tag v1.2.3 : :1.2.3 + :1.2 + :1 + :latest
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - uses: docker/build-push-action@v6
        with:
          # Contexte = racine du repo (le Dockerfile fait COPY healthai-common ...)
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          token: ${{ secrets.GITHUB_TOKEN }}

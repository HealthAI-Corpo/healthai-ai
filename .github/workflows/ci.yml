name: CI

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [healthai-vision, healthai-workout, healthai-api]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
        working-directory: ${{ matrix.service }}
      - run: uv run ruff check .
        working-directory: ${{ matrix.service }}
      - run: uv run ruff format --check .
        working-directory: ${{ matrix.service }}

  test:
    name: pytest (healthai-vision)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
        working-directory: healthai-vision
      - run: uv run pytest tests/ -v --tb=short
        working-directory: healthai-vision

  build-push:
    name: Build & Push → ghcr.io (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: healthai-vision
            context: healthai-vision
            image: ghcr.io/healthai-corpo/healthai-vision
          - name: healthai-workout
            context: healthai-workout
            image: ghcr.io/healthai-corpo/healthai-workout
          - name: healthai-ai-api
            context: healthai-api
            image: ghcr.io/healthai-corpo/healthai-ai-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.service.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          token: ${{ secrets.GITHUB_TOKEN }}
